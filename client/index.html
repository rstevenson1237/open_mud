<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUD</title>
  <link rel="stylesheet" href="/terminal.css">
</head>
<body>
  <div id="app">
    <div id="left-pane">
      <div id="output" role="log" aria-live="polite"></div>
      <div id="input-row">
        <span id="prompt">&gt;</span>
        <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Command input">
      </div>
      <div id="panel-overlay" hidden>
        <div id="panel-container">
          <div id="panel-header">
            <span id="panel-title"></span>
          </div>
          <div id="panel-description" hidden></div>
          <div id="panel-error" hidden></div>
          <div id="panel-body"></div>
          <div id="panel-footer">
            <button id="panel-cancel-btn" type="button">Cancel</button>
            <button id="panel-confirm-btn" type="button">Confirm</button>
          </div>
        </div>
      </div>
    </div>
    <div id="right-pane">
      <div id="status-panel">
        <div id="sp-name"></div>
        <div id="sp-location"></div>
        <div id="sp-zone"></div>
        <div class="sp-section">
          <div class="sp-label">VITALS</div>
          <div class="sp-track" id="sp-wounds"></div>
          <div class="sp-track" id="sp-sanity"></div>
          <div class="sp-track" id="sp-stress"></div>
          <div class="sp-track" id="sp-hunger"></div>
          <div class="sp-track" id="sp-rest"></div>
        </div>
        <div class="sp-section">
          <div class="sp-label">STATS</div>
          <table id="sp-stats-grid">
            <thead>
              <tr><th></th><th>FOR</th><th>PRE</th><th>RES</th></tr>
            </thead>
            <tbody>
              <tr><td class="sp-major">PHY</td><td id="sp-phy_for"></td><td id="sp-phy_pre"></td><td id="sp-phy_res"></td></tr>
              <tr><td class="sp-major">MEN</td><td id="sp-men_for"></td><td id="sp-men_pre"></td><td id="sp-men_res"></td></tr>
              <tr><td class="sp-major">SOC</td><td id="sp-soc_for"></td><td id="sp-soc_pre"></td><td id="sp-soc_res"></td></tr>
            </tbody>
          </table>
        </div>
        <div class="sp-section">
          <div class="sp-label">CONDITIONS</div>
          <div id="sp-conditions">—</div>
        </div>
      </div>
    </div>
  </div>
  <script src="/terminal.js"></script>
</body>
</html>
